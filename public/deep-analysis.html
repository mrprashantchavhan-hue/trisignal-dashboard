<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deep Analysis — TriSignal Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
    --border: #30363d; --border2: #21262d;
    --text: #e6edf3; --text2: #8b949e; --text3: #484f58;
    --green: #3fb950; --red: #f85149; --yellow: #d29922;
    --blue: #58a6ff; --purple: #bf40bf;
    --gold: #FFD700;
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 0; overflow-x: hidden; }

  /* Top gradient bar */
  .top-bar { height: 3px; background: linear-gradient(90deg, #3fb950, #58a6ff, #bf40bf); }

  .container { max-width: 1100px; margin: 0 auto; padding: 24px 20px 60px; }

  /* Header */
  .header { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; }
  .back-btn { display: flex; align-items: center; gap: 6px; text-decoration: none; color: var(--text2); font-size: 13px; padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; transition: all 0.2s; background: var(--bg2); }
  .back-btn:hover { color: var(--text); border-color: #58a6ff; background: var(--bg3); }
  .stock-title { flex: 1; }
  .stock-symbol { font-size: 28px; font-weight: 700; background: linear-gradient(90deg, #e6edf3, #58a6ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-family: 'JetBrains Mono', monospace; }
  .stock-meta { font-size: 13px; color: var(--text2); margin-top: 4px; }
  .price-tag { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 600; color: var(--green); }

  /* Loading spinner */
  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 320px; gap: 16px; }
  .spinner { width: 48px; height: 48px; border: 3px solid var(--border); border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--text2); font-size: 13px; }

  /* Recommendation Hero */
  .rec-hero { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }
  .rec-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; position: relative; overflow: hidden; }
  .rec-card.best { border-color: var(--gold); box-shadow: 0 0 20px rgba(255,215,0,0.08); }
  .rec-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, #3fb950, #58a6ff); border-radius: 12px 12px 0 0; }
  .rec-card.best::before { background: linear-gradient(90deg, var(--gold), #ff9500); }
  .rec-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 8px; }
  .rec-tf { font-size: 32px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--gold); }
  .rec-tf-label { font-size: 14px; color: var(--text); margin-top: 4px; }
  .rec-sub { font-size: 12px; color: var(--text2); margin-top: 8px; line-height: 1.5; }
  .rec-split { display: flex; gap: 20px; margin-top: 12px; }
  .rec-stat { text-align: center; }
  .rec-stat-val { font-size: 18px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
  .rec-stat-lbl { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
  .crown { position: absolute; top: 12px; right: 16px; font-size: 22px; }

  /* Section title */
  .section-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Timeframe grid */
  .tf-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; margin-bottom: 32px; }
  .tf-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; transition: all 0.2s; position: relative; overflow: hidden; }
  .tf-card:hover { border-color: #58a6ff40; transform: translateY(-1px); }
  .tf-card.is-best { border-color: var(--gold); background: linear-gradient(135deg, #21262d, #1a1600); }
  .tf-card.is-best:hover { box-shadow: 0 4px 20px rgba(255,215,0,0.1); }
  .tf-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .tf-interval { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 600; }
  .tf-desc { font-size: 11px; color: var(--text2); }
  .grade-badge { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 6px; font-size: 13px; font-weight: 700; }
  .grade-A { background: rgba(63,185,80,0.15); color: #3fb950; }
  .grade-B { background: rgba(88,166,255,0.15); color: #58a6ff; }
  .grade-C { background: rgba(210,153,34,0.15); color: #d29922; }
  .grade-D { background: rgba(248,81,73,0.12); color: #f85149; }
  .grade-X { background: rgba(72,79,88,0.3); color: #484f58; }
  .tf-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .tf-stat { text-align: center; background: var(--bg3); border-radius: 6px; padding: 8px 4px; }
  .tf-stat-val { font-size: 13px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
  .tf-stat-lbl { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
  .tf-signal { margin-top: 10px; font-size: 11px; padding: 6px 10px; border-radius: 6px; background: var(--bg3); color: var(--text2); display: flex; align-items: center; gap: 6px; }
  .signal-buy { color: var(--green); background: rgba(63,185,80,0.08); }
  .signal-sell { color: var(--purple); background: rgba(191,64,191,0.08); }
  .signal-hold { color: var(--yellow); background: rgba(210,153,34,0.08); }
  .best-crown { position: absolute; top: 10px; right: 10px; font-size: 16px; }

  /* Entry card */
  .entry-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 32px; }
  .entry-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
  .entry-lbl { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text2); margin-bottom: 6px; }
  .entry-val { font-size: 20px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
  .c-green { color: var(--green); }
  .c-red   { color: var(--red); }
  .c-gold  { color: var(--gold); }

  /* Error box */
  .error-box { background: rgba(248,81,73,0.08); border: 1px solid rgba(248,81,73,0.3); border-radius: 8px; padding: 16px; color: #f85149; font-size: 13px; }

  /* Responsive */
  @media (max-width: 640px) {
    .rec-hero { grid-template-columns: 1fr; }
    .tf-grid { grid-template-columns: 1fr; }
    .entry-grid { grid-template-columns: 1fr; }
  }

  /* Pulse animation for active signals */
  @keyframes pulse-glow { 0%,100% { box-shadow: 0 0 0 0 rgba(63,185,80,0.3); } 50% { box-shadow: 0 0 12px 4px rgba(63,185,80,0.15); } }
  .active-signal { animation: pulse-glow 2s ease-in-out infinite; }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="container">

  <div class="header">
    <a href="/" class="back-btn">← Dashboard</a>
    <div class="stock-title">
      <div class="stock-symbol" id="page-symbol">Loading...</div>
      <div class="stock-meta" id="page-meta">Analyzing all timeframes...</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:flex-end; gap:6px;">
      <div style="font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px;">Start Amount</div>
      <div style="display:flex; align-items:center; gap:8px;">
        <span style="color:var(--text2); font-size:14px;">₹</span>
        <input id="amount-input" type="number" value="10000" min="100" step="1000"
          style="width:110px; background:var(--bg2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:15px; font-family:'JetBrains Mono',monospace; padding:6px 10px; text-align:right;"
          onchange="START_AMOUNT=parseFloat(this.value)||10000; renderResults(window._lastData)">
      </div>
    </div>
  </div>

  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-text">⚡ Analyzing 6 timeframes simultaneously...</div>
      <div class="loading-text" id="loading-sub" style="font-size:11px;">Fetching 5m · 15m · 30m · 1h · 1d · 1wk</div>
    </div>
  </div>

</div>

<script>
const params = new URLSearchParams(location.search);
const SYMBOL = params.get('symbol') || '';
const MARKET = params.get('market') || 'nifty';
let START_AMOUNT = parseFloat(params.get('amount') || '10000');

document.addEventListener('DOMContentLoaded', () => {
  const el = document.getElementById('page-symbol');
  if (el) el.textContent = SYMBOL || 'Unknown';
  const inp = document.getElementById('amount-input');
  if (inp) inp.value = START_AMOUNT;
  document.title = `${SYMBOL} Deep Analysis — TriSignal Pro`;
});

// How many months of data each timeframe covers
const TF_MONTHS = { '5m': 0.25, '15m': 2, '30m': 1, '1h': 2, '1d': 60, '1wk': 60 };

const GRADE_COLOR = { A: '#3fb950', B: '#58a6ff', C: '#d29922', D: '#f85149', X: '#484f58' };
const SIG_ICONS = {
  BUY_NEW: '🟢 BUY', HOLD_LONG: '🟡 HOLDING LONG', EXIT_LONG: '🔵 EXIT LONG',
  SELL_NEW: '🟣 SELL SHORT', HOLD_SHORT: '🟡 HOLDING SHORT', EXIT_SHORT: '🔴 EXIT SHORT', FLAT: '⚪ FLAT'
};

function fmt(n, dec = 2) { return Number(n).toFixed(dec); }
function fmtCurrency(n) {
  return new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n);
}
function calcProfit(netPct, interval) {
  const total   = START_AMOUNT * (netPct / 100);
  const monthly = total / (TF_MONTHS[interval] || 1);
  return { total, monthly };
}

async function loadAnalysis() {
  try {
    const resp = await fetch('/api/deep-analysis', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ symbol: SYMBOL, market: MARKET })
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    renderResults(data);
  } catch (err) {
    document.getElementById('content').innerHTML = `
      <div class="error-box">❌ Failed to load analysis: ${err.message}<br>
      <small>Make sure the server is running and the stock symbol is correct.</small></div>`;
  }
}

function renderResults(data) {
  window._lastData = data; // store so amount input can re-render
  const { symbol, results, bestTimeframe, intradayBest, swingBest } = data;
  const best = results.find(r => r.interval === bestTimeframe);
  const intradayR = results.find(r => r.interval === intradayBest);
  const swingR    = results.find(r => r.interval === swingBest);

  if (best && best.bars > 0) {
    const metaEl = document.getElementById('page-meta');
    if (metaEl) metaEl.textContent = `Best timeframe: ${best.label} · Win Rate: ${best.winRate}% · PF: ${best.pf}`;
  }
  const priceEl = document.getElementById('page-price');
  if (priceEl) priceEl.textContent = '';

  let html = '';

  // ── Recommendation Hero ──────────────────────────────────
  html += `<div class="rec-hero">`;

  // Intraday recommendation
  if (intradayR) {
    const ip = calcProfit(intradayR.netPct, intradayR.interval);
    html += `
    <div class="rec-card">
      <div class="rec-label">📈 Best Intraday Timeframe</div>
      <div class="rec-tf">${intradayR.interval.toUpperCase()}</div>
      <div class="rec-tf-label">${intradayR.label}</div>
      <div class="rec-sub">Use this timeframe for same-day trading. Historically delivers the strongest intraday edge.</div>
      <div class="rec-split">
        <div class="rec-stat"><div class="rec-stat-val" style="color:#3fb950">${intradayR.winRate}%</div><div class="rec-stat-lbl">Win Rate</div></div>
        <div class="rec-stat"><div class="rec-stat-val" style="color:#58a6ff">${intradayR.pf}x</div><div class="rec-stat-lbl">Prof. Factor</div></div>
        <div class="rec-stat"><div class="rec-stat-val" style="color:${ip.total>=0?'#3fb950':'#f85149'}">${ip.total>=0?'+':''}${fmtCurrency(ip.total)}</div><div class="rec-stat-lbl">Total Profit</div></div>
        <div class="rec-stat"><div class="rec-stat-val" style="color:${ip.monthly>=0?'#d29922':'#f85149'}">${ip.monthly>=0?'+':''}${fmtCurrency(ip.monthly)}</div><div class="rec-stat-lbl">Est./Month</div></div>
      </div>
    </div>`;
  } else {
    html += `<div class="rec-card"><div class="rec-label">📈 Intraday</div><div class="rec-tf" style="color:#f85149">—</div><div class="rec-sub" style="color:#f85149">No profitable intraday timeframe found. Avoid intraday for this stock.</div></div>`;
  }

  // Swing recommendation
  if (swingR) {
    const sp = calcProfit(swingR.netPct, swingR.interval);
    html += `
    <div class="rec-card best">
      <div class="crown">👑</div>
      <div class="rec-label">📅 Best Swing Timeframe</div>
      <div class="rec-tf">${swingR.interval.toUpperCase()}</div>
      <div class="rec-tf-label">${swingR.label}</div>
      <div class="rec-sub">Hold for multiple days or weeks. This is where the edge is most pronounced historically.</div>
      <div class="rec-split">
        <div class="rec-stat"><div class="rec-stat-val" style="color:#3fb950">${swingR.winRate}%</div><div class="rec-stat-lbl">Win Rate</div></div>
        <div class="rec-stat"><div class="rec-stat-val" style="color:#58a6ff">${swingR.pf}x</div><div class="rec-stat-lbl">Prof. Factor</div></div>
        <div class="rec-stat"><div class="rec-stat-val" style="color:${sp.total>=0?'#3fb950':'#f85149'}">${sp.total>=0?'+':''}${fmtCurrency(sp.total)}</div><div class="rec-stat-lbl">Total Profit</div></div>
        <div class="rec-stat"><div class="rec-stat-val" style="color:${sp.monthly>=0?'#d29922':'#f85149'}">${sp.monthly>=0?'+':''}${fmtCurrency(sp.monthly)}</div><div class="rec-stat-lbl">Est./Month</div></div>
      </div>
    </div>`;
  } else {
    html += `<div class="rec-card"><div class="rec-label">📅 Swing</div><div class="rec-tf" style="color:#f85149">—</div><div class="rec-sub" style="color:#f85149">No profitable swing timeframe found for this stock.</div></div>`;
  }

  html += `</div>`;

  // ── Best entry levels ────────────────────────────────────
  if (best && best.sigE) {
    html += `<div class="section-title">🎯 Current Entry Setup (${best.interval.toUpperCase()})</div>`;
    html += `<div class="entry-grid">
      <div class="entry-card">
        <div class="entry-lbl">Entry Price</div>
        <div class="entry-val c-gold">${fmtCurrency(best.sigE)}</div>
      </div>
      <div class="entry-card">
        <div class="entry-lbl">Take Profit</div>
        <div class="entry-val c-green">${best.sigTP ? fmtCurrency(best.sigTP) : '—'}</div>
      </div>
      <div class="entry-card">
        <div class="entry-lbl">Stop Loss</div>
        <div class="entry-val c-red">${best.sigSL ? fmtCurrency(best.sigSL) : '—'}</div>
      </div>
    </div>`;
  }

  // ── All timeframes comparison grid ──────────────────────
  html += `<div class="section-title">🕐 All Timeframes — Full Comparison</div>`;
  html += `<div class="tf-grid">`;

  for (const r of results) {
    const isBest = r.interval === bestTimeframe;
    const sigIcon = SIG_ICONS[r.signal] || '⚪ FLAT';
    const sigCls = r.signal?.includes('BUY') || r.signal?.includes('LONG') ? 'signal-buy' : r.signal?.includes('SELL') || r.signal?.includes('SHORT') ? 'signal-sell' : r.signal?.includes('HOLD') ? 'signal-hold' : '';

    const netColor = r.netPct >= 5 ? '#3fb950' : r.netPct >= 0 ? '#d29922' : '#f85149';
    const wrColor  = r.winRate >= 55 ? '#3fb950' : r.winRate >= 45 ? '#d29922' : '#f85149';
    const pfColor  = r.pf >= 1.5 ? '#3fb950' : r.pf >= 1.0 ? '#d29922' : '#f85149';

    html += `
    <div class="tf-card ${isBest ? 'is-best' : ''}">
      ${isBest ? '<div class="best-crown">👑</div>' : ''}
      <div class="tf-card-header">
        <div>
          <div class="tf-interval">${r.interval.toUpperCase()}</div>
          <div class="tf-desc">${r.label} · ${r.bars} bars</div>
        </div>
        <div class="grade-badge grade-${r.grade}">${r.grade}</div>
      </div>
      ${r.grade === 'X' ? `<div style="color:#484f58; font-size:12px; padding:8px 0;">⚠️ ${r.error || 'No data available'}</div>` : (() => {
        const p = calcProfit(r.netPct, r.interval);
        const profitColor = p.total >= 0 ? '#3fb950' : '#f85149';
        const moColor = p.monthly >= 0 ? '#d29922' : '#f85149';
        return `
      <div class="tf-stats" style="grid-template-columns: repeat(3,1fr);">
        <div class="tf-stat"><div class="tf-stat-val" style="color:${wrColor}">${fmt(r.winRate,1)}%</div><div class="tf-stat-lbl">Win Rate</div></div>
        <div class="tf-stat"><div class="tf-stat-val" style="color:${pfColor}">${fmt(r.pf,2)}</div><div class="tf-stat-lbl">Prof. Factor</div></div>
        <div class="tf-stat"><div class="tf-stat-val" style="color:${r.maxDD>20?'#f85149':'#8b949e'}">${fmt(r.maxDD,1)}%</div><div class="tf-stat-lbl">Max DD</div></div>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:6px;">
        <div class="tf-stat"><div class="tf-stat-val" style="color:${profitColor}; font-size:11px;">${p.total>=0?'+':''}${fmtCurrency(p.total)}</div><div class="tf-stat-lbl">Total Profit</div></div>
        <div class="tf-stat"><div class="tf-stat-val" style="color:${moColor}; font-size:11px;">${p.monthly>=0?'+':''}${fmtCurrency(p.monthly)}</div><div class="tf-stat-lbl">Est./Month</div></div>
      </div>
      <div class="tf-signal ${sigCls}">
        <span>${sigIcon}</span>
        ${r.signalDetails ? `<span style="font-size:10px; color:#8b949e">${r.signalDetails.substring(0,60)}</span>` : ''}
      </div>`;
      })()}
    </div>`;
  }

  html += `</div>`;

  // ── Trades count summary ────────────────────────────────
  html += `<div class="section-title">📊 Trade Count by Timeframe</div>`;
  html += `<div style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:32px;">`;
  for (const r of [...results].sort((a, b) => a.interval.localeCompare(b.interval))) {
    const bg = r.interval === bestTimeframe ? 'rgba(255,215,0,0.1)' : 'var(--bg2)';
    const border = r.interval === bestTimeframe ? '#FFD700' : 'var(--border)';
    html += `
    <div style="background:${bg}; border:1px solid ${border}; border-radius:8px; padding:12px 18px; text-align:center; min-width:90px;">
      <div style="font-family:'JetBrains Mono',monospace; font-size:22px; font-weight:700; color:${GRADE_COLOR[r.grade] || '#8b949e'}">${r.trades}</div>
      <div style="font-size:11px; color:#8b949e; margin-top:4px;">${r.interval.toUpperCase()} trades</div>
    </div>`;
  }
  html += `</div>`;

  document.getElementById('content').innerHTML = html;
}

loadAnalysis();
</script>
</body>
</html>
